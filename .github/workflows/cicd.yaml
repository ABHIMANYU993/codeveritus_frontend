name: Deploy Frontend

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # BEST PRACTICE: Use the official Docker action for a secure login.
      - name: Log In to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }} # This MUST be a Docker Hub Access Token

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/codeveritus-frontend:latest --build-arg REACT_APP_API_URL='${{ secrets.REACT_APP_API_URL }}' .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/codeveritus-frontend:latest

  deploy:
    name: Deploy to RHEL via Cloudflare Tunnel
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # BEST PRACTICE: Native ssh-agent setup to support passphrases securely
      - name: Set Up SSH Agent
        env:
          SSH_PASSPHRASE: ${{ secrets.SSH_KEY_PASSPHRASE }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # Start ssh-agent and export the socket so subsequent steps can use it
          ssh-agent -a /tmp/ssh_agent.sock > /dev/null
          echo "SSH_AUTH_SOCK=/tmp/ssh_agent.sock" >> $GITHUB_ENV
          
          # Securely save the private key
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Create a temporary askpass script to feed the passphrase securely
          echo 'echo "${SSH_PASSPHRASE}"' > /tmp/askpass.sh
          chmod +x /tmp/askpass.sh
          
          # Add the key to the agent using the askpass trick
          DISPLAY=none SSH_ASKPASS=/tmp/askpass.sh ssh-add ~/.ssh/id_rsa < /dev/null

      - name: Configure Enterprise Grade SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Military-grade SSH Hardening (Matching server sshd_config)
          cat <<EOF > ~/.ssh/config
          Host alpine-vm
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USERNAME }}
            Port ${{ secrets.SSH_PORT }}
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            IdentitiesOnly yes
            Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
            MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com
            KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512
            ServerAliveInterval 60
            ServerAliveCountMax 3
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy via SSH
        run: |
          ssh alpine-vm << 'EOF'
            cd ${{ secrets.DEPLOY_DIR }}

            echo "🛠️ Pulling latest Docker image for the frontend..."
            docker compose pull frontend

            echo "🚀 Recreating frontend container..."
            # This single command handles stopping, removing, and starting the new container.
            docker compose up -d --force-recreate --remove-orphans frontend

            echo "🧹 Pruning old, unused frontend images..."
            # This safely removes only the old frontend image, not affecting other projects.
            docker images --filter "dangling=true" --filter "reference=${{ secrets.DOCKER_USERNAME }}/codeveritus-frontend" -q | xargs -r docker rmi

            echo "✅ Deployment complete!"
          EOF