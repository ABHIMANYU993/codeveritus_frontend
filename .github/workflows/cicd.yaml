name: Deploy Frontend

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest # Let GitHub's cloud handle the heavy lifting of building the image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log In to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/codeveritus-frontend:latest --build-arg REACT_APP_API_URL='${{ secrets.REACT_APP_API_URL }}' .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/codeveritus-frontend:latest

  deploy:
    name: Deploy to Alpine via Native Local SSH
    runs-on: self-hosted # GitHub sends the trigger to your ultra-light LXC
    needs: build
    steps:
      - name: Native SSH Execution
        # We use standard bash to pipe the deployment script directly into the Alpine VM over native SSH.
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ${{ secrets.DEPLOY_DIR }}

            echo "🛠️ Pulling latest Docker image..."
            docker compose pull frontend

            echo "🚀 Recreating frontend container..."
            docker compose up -d --force-recreate --remove-orphans frontend

            echo "🧹 Pruning old images..."
            docker images --filter "dangling=true" --filter "reference=${{ secrets.DOCKER_USERNAME }}/codeveritus-frontend" -q | xargs -r docker rmi
            
            echo "✅ Native Deployment complete!"
          EOF

