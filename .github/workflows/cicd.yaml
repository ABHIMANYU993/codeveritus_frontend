name: Deploy Frontend

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # BEST PRACTICE: Use the official Docker action for a secure login.
      - name: Log In to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }} # This MUST be a Docker Hub Access Token

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/codeveritus-frontend:latest --build-arg REACT_APP_API_URL='${{ secrets.REACT_APP_API_URL }}' .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/codeveritus-frontend:latest
  deploy:
    name: Deploy to Alpine via Local LXC Runner
    runs-on: self-hosted # <--- THIS IS THE MAGIC WORD. GitHub sends the job to your LXC.
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Local SSH Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }} # Your Alpine VM's local IP address
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }} # Put the LXC's id_ed25519 private key in GitHub secrets
          # No passphrase needed, no port forwarding, no DDNS!
          script: |
            cd ${{ secrets.DEPLOY_DIR }}

            echo "🛠️ Pulling latest Docker image..."
            docker compose pull frontend

            echo "🚀 Recreating frontend container..."
            docker compose up -d --force-recreate --remove-orphans frontend

            echo "🧹 Pruning old images..."
            docker images --filter "dangling=true" --filter "reference=${{ secrets.DOCKER_USERNAME }}/codeveritus-frontend" -q | xargs -r docker rmi
            
            echo "✅ Local Enterprise Deployment complete!"