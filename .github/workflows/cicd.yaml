name: Deploy Frontend

on:
  push:
    branches:
      - master 

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/codeveritus-frontend --build-arg REACT_APP_API_URL='${{ secrets.REACT_APP_API_URL }}' .

      - name: Log In to Docker Hub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/codeveritus-frontend:latest

  deploy:
    name: Deploy to RHEL via Cloudflare Tunnel
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg | sudo tee /usr/share/keyrings/cloudflare-main.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared jammy main' | sudo tee /etc/apt/sources.list.d/cloudflared.list
          sudo apt-get update && sudo apt-get install -y cloudflared

      - name: Set Up SSH Agent with Private Key
        env:
          SSH_KEY_PASSPHRASE: ${{ secrets.SSH_KEY_PASSPHRASE }}
        run: |
          eval "$(ssh-agent -s)"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | ssh-add - <<< "$SSH_KEY_PASSPHRASE"
          ssh-add -l

      - name: Configure SSH for Tunnel
        run: |
          mkdir -p ~/.ssh
          cat <<EOF > ~/.ssh/config
          Host rhel-tunnel
            HostName rhel-192-168-13-45-compute.makeatron.in
            User root
            ProxyCommand cloudflared access ssh --hostname rhel-192-168-13-45-compute.makeatron.in
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          ssh-keyscan -H rhel-192-168-13-45-compute.makeatron.in >> ~/.ssh/known_hosts

      - name: Deploy via SSH through Cloudflare Tunnel
        run: |
          ssh rhel-tunnel << 'EOF'
            cd /opt/codeveritus

            echo "🧨 Removing old frontend container..."
            docker ps -a --filter "name=codeveritus-frontend" -q | xargs -r docker rm -f || true

            echo "🛠 Pulling latest Docker images..."
            docker-compose pull frontend

            echo "🚀 Recreating frontend container..."
            docker-compose up -d --force-recreate frontend

            echo "🧹 Pruning unused images, containers, and volumes..."
            docker images --filter "dangling=true" --filter "reference=${{ secrets.DOCKER_USERNAME }}/codeveritus-frontend" -q | xargs -r docker rmi

            echo "✅ Deployment complete!"
            docker ps
          EOF
